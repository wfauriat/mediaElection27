# 2027 French presidential election — candidate registry.
# Config-as-data: edit and re-run `python -m app.sources.seed` to apply.
#
# Field notes:
#   id              - hand-assigned SMALLINT, stable across reseeds
#   slug            - lower-snake, used in URLs and API responses
#   display_name    - shown in the UI (in French)
#   eligible        - false → shown in a separate "ineligible / contested" panel
#   declared_at     - ISO date the candidate publicly entered the race
#   aliases         - strings the keyword matcher will look for
#     match_kind    - wholeword | exact | regex
#     requires_context - secondary token that must appear nearby to disambiguate

candidates:
  - id: 1
    slug: melenchon
    display_name: Jean-Luc Mélenchon
    party: LFI
    lean: hard-left
    declared_at: 2026-05-03
    eligible: true
    notes: Declared 2026-05-03 (France 24).
    aliases:
      - { alias: "Jean-Luc Mélenchon", match_kind: exact }
      - { alias: "Mélenchon", match_kind: wholeword }
      - { alias: "Melenchon", match_kind: wholeword }   # accent-stripped fallback
      - { alias: "JLM", match_kind: wholeword }

