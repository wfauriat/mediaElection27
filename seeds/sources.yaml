  # Les Échos: their edge layer (Akamai) returns 403 to all server-side IPs
  # regardless of User-Agent. Would need a headless-browser fetcher. Disabled.
  - id: 10
    slug: lesechos-france
    outlet: Les Échos
    section: france
    feed_url: https://syndication.lesechos.fr/rss/rss_france.xml
    lean: centre
    is_active: false

  # La Croix has removed their public RSS feeds (/RSS/une 302s to /choix_redac/rss
  # which is 404). Left in seeds for visibility; reactivate when an alternative
  # ingestion route is identified.
  - id: 11
    slug: lacroix-une
    outlet: La Croix
    section: une
    feed_url: https://www.la-croix.com/RSS/une
    lean: centre
    is_active: false

