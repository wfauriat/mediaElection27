# French media RSS sources for the 2027 election tracker.
# Edit and re-run `python -m app.sources.seed` to apply.
#
# URLs were sourced from outlet-published feed lists and the Atlas des flux RSS
# directory; the ingest code logs and gracefully skips any feed that returns
# 4xx/5xx or unparseable XML. Adjust feed_url here without redeploying.

sources:
  - id: 1
    slug: lemonde-politique
    outlet: Le Monde
    section: politique
    feed_url: https://www.lemonde.fr/politique/rss_full.xml
    lean: centre-left

  - id: 2
    slug: lefigaro-politique
    outlet: Le Figaro
    section: politique
    feed_url: https://www.lefigaro.fr/rss/figaro_politique.xml
    lean: centre-right

  - id: 3
    slug: liberation-politique
    outlet: Libération
    section: politique
    feed_url: https://www.liberation.fr/arc/outboundfeeds/rss/category/politique/?outputType=xml
    lean: left

  - id: 4
    slug: mediapart
    outlet: Mediapart
    section: une
    feed_url: https://www.mediapart.fr/articles/feed
    lean: left

  - id: 5
