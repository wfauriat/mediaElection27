name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  python:
    name: ruff + mypy + pytest (unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project + dev deps
        run: pip install -e ".[dev]"

      - name: ruff check
        run: ruff check .

      - name: mypy --strict
        run: mypy app

      - name: pytest (unit only)
        run: pytest tests/unit -q
